<!DOCTYPE html>
<html>
<head>
    <title>Widget Test</title>
<h1 id="status">Waiting for script...</h1>
<div data-acpim-widget></div>

<script>
  // This will tell us if the JS file is actually reachable
  fetch('https://pimtom.github.io/cdn-test-/pim-widget.js')
    .then(r => { if(r.ok) document.getElementById('status').innerText = "Script file found! Loading widget..."; })
    .catch(e => { document.getElementById('status').innerText = "Cannot find pim-widget.js - check URL!"; });
</script>
</head>
<body style="padding: 50px; font-family: sans-serif;">

    <h1>Testing the Widget</h1>
    <p>The widget should appear below this line:</p>
    
    <div data-acpim-widget></div>

    <p>If you see a purple banner above, it's working!</p>

</body>
</html>
